packages:
  - packages/**
  - docs
  - playground
  - e2e
  - codegen-projects/*

catalog:
  '@better-fetch/fetch': ^1.1.21
  better-call: 1.3.6
  tsx: ^4.21.0
  typescript: ^5.6.3
  unbuild: 3.6.1
  vitest: ^3.2.4

catalogs:
  react18:
    '@types/react': ^19.1.12
    '@types/react-dom': ^19.1.9
    react: 19.1.1
    react-dom: 19.1.1

neverBuiltDependencies: []

supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
  libc:
    - current
    - glibc

overrides:
  esbuild@<=0.24.2: '>=0.25.0'
  miniflare>zod: ^3.25.1
  # The pinned TanStack Start 1.167.x toolchain (see setup-tanstack.sh) still
  # uses the zod v3 API internally; scoped overrides win over the global pin.
  '@tanstack/router-generator>zod': ^3.25.1
  '@tanstack/router-plugin>zod': ^3.25.1
  '@tanstack/start-plugin-core>zod': ^3.25.1
  # Exact pin: zod brands its minor version into its types ($ZodType _zod.version),
  # so two coexisting 4.x resolutions (e.g. 4.2.x and 4.4.x) fail to typecheck
  # against each other in fresh codegen-project installs.
  zod: 4.4.3
