name: BTST Init CLI Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  nightly-init:
    name: Nightly init smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build @btst/stack
        run: pnpm --filter @btst/stack build

      - name: Build @btst/codegen
        run: pnpm --filter @btst/codegen build

      - name: Run nightly init harness
        working-directory: packages/cli
        run: bash scripts/test-init.sh
        timeout-minutes: 30
        env:
          CI: true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: btst-init-nightly-fixtures
          path: /tmp/test-btst-init-*/
          retention-days: 5
