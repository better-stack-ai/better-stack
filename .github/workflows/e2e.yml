name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  e2e:
    name: E2E (${{ matrix.framework }})
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-${{ matrix.framework }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NODE_OPTIONS: --max-old-space-size=8192

    strategy:
      fail-fast: false
      matrix:
        framework: [nextjs, tanstack, react-router]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: cd e2e && pnpm exec playwright install --with-deps

      - name: Build workspace
        run: pnpm -w build

      - name: Run Playwright smoke tests (${{ matrix.framework }})
        run: pnpm e2e:smoke:${{ matrix.framework }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.framework }}
          path: e2e/playwright-report
          if-no-files-found: ignore

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.framework }}
          path: test-results/**/*.zip
          if-no-files-found: ignore
