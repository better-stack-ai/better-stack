name: Codegen E2E Tests

# Tests the btst init CLI codegen experience from scratch:
#   shadcn init → btst init → apply E2E patches → build → run Playwright
#
# The codegen-projects/ directory is never committed — it is always built
# fresh from scripts/codegen/setup-nextjs.sh in each CI run.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/cli/**'
      - 'packages/stack/**'
      - 'scripts/codegen/**'
      - 'e2e/**'
      - '.github/workflows/codegen-e2e.yml'

jobs:
  codegen-e2e-nextjs:
    name: Codegen E2E (nextjs)
    runs-on: ubuntu-latest
    concurrency:
      group: codegen-e2e-nextjs-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max-old-space-size=8192

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install monorepo dependencies
        run: pnpm install

      - name: Build workspace
        run: pnpm -w build

      # Creates codegen-projects/nextjs/ from scratch:
      #   1. shadcn init (Next.js + Nova preset)
      #   2. btst init (all plugins, memory adapter)
      #   3. pnpm dlx shadcn add (extra UI components)
      #   4. Apply .patch files from scripts/codegen/patches/nextjs/
      #   5. pnpm install
      - name: Set up Next.js codegen project from scratch
        run: bash scripts/codegen/setup-nextjs.sh
        timeout-minutes: 20
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install Playwright browsers
        run: cd e2e && pnpm exec playwright install --with-deps

      # The E2E config (playwright.codegen.config.ts) starts the Next.js server
      # via `pnpm -F nextjs run start:e2e` (builds + starts on port 3006).
      - name: Run codegen E2E tests (nextjs)
        run: pnpm -F e2e codegen:e2e:nextjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-codegen-nextjs
          path: e2e/playwright-report-codegen
          if-no-files-found: ignore

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-codegen-nextjs
          path: test-results-codegen/**/*.zip
          if-no-files-found: ignore
