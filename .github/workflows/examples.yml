name: Demo Projects

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'demos/**'
      - '.github/workflows/examples.yml'

concurrency:
  group: demos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Demo Projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install — ai-chat
        working-directory: demos/ai-chat
        run: pnpm install

      - name: Build — ai-chat
        working-directory: demos/ai-chat
        run: pnpm build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install — blog
        working-directory: demos/blog
        run: pnpm install

      - name: Build — blog
        working-directory: demos/blog
        run: pnpm build

      - name: Install — cms
        working-directory: demos/cms
        run: pnpm install

      - name: Build — cms
        working-directory: demos/cms
        run: pnpm build

      - name: Install — form-builder
        working-directory: demos/form-builder
        run: pnpm install

      - name: Build — form-builder
        working-directory: demos/form-builder
        run: pnpm build

      - name: Install — kanban
        working-directory: demos/kanban
        run: pnpm install

      - name: Build — kanban
        working-directory: demos/kanban
        run: pnpm build

      - name: Install — ui-builder
        working-directory: demos/ui-builder
        run: pnpm install

      - name: Build — ui-builder
        working-directory: demos/ui-builder
        run: pnpm build
